<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appointment Booking</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f4f4;
    }

    .container{
      width:500px;
      margin:40px auto;
      background:#fff;
      padding:30px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,.2);
    }

    h2{
      text-align:center;
    }

    button{
      width:100%;
      padding:12px;
      background:#0d6efd;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    button:hover{
      background:#0b5ed7;
    }
  </style>

</head>
<body>

<div class="container">

<h2>Book Appointment</h2>

<form method="POST">

  {% csrf_token %}

  {{ form.as_p }}

  <button type="submit">
    Book Appointment
  </button>

</form>

</div>

</body>
</html>
